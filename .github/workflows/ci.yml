name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2025-vs2026, macos-latest]
        build-type: [Debug, RelWithDebInfo]

    steps:
    - uses: actions/checkout@v4

    - name: Install Conan
      uses: conan-io/setup-conan@v1

    - name: Configure Conan Profile (Windows)
      if: matrix.os == 'windows-2025-vs2026'
      shell: pwsh
      run: |
        $ProfileContent = @"
        [settings]
        os=Windows
        arch=x86_64
        compiler=msvc
        compiler.version=193
        compiler.cppstd=23
        compiler.runtime=dynamic
        build_type=Release
        "@

        $ProfileDir = "$HOME\.conan2\profiles"
        $ProfileContent | Out-File -FilePath "$ProfileDir\default" -Encoding ascii

    - name: Install Conan dependencies
      run: |
        conan install . --output-folder=build/debug --build=missing -s build_type=Debug
        conan install . --output-folder=build/release --build=missing -s build_type=Release

    - name: Configure CMake (Linux/macOS)
      if: matrix.os != 'windows-2025-vs2026'
      run: |
        if [ "${{ matrix.build-type }}" = "Debug" ]; then
          cmake --preset=debug
        else
          cmake --preset=release
        fi

    - name: Configure CMake (Windows)
      if: matrix.os == 'windows-2025-vs2026'
      shell: cmd
      run: |
        if "${{ matrix.build-type }}"=="Debug" (
          cmake --preset=debug -G "Visual Studio 18 2026" -A x64
        ) else (
          cmake --preset=release -G "Visual Studio 18 2026" -A x64
        )

    - name: Build (Linux/macOS)
      if: matrix.os != 'windows-2025-vs2026'
      run: |
        if [ "${{ matrix.build-type }}" = "Debug" ]; then
          cmake --build --preset=debug
        else
          cmake --build --preset=release
        fi

    - name: Build (Windows)
      if: matrix.os == 'windows-2025-vs2026'
      shell: cmd
      run: |
        if "${{ matrix.build-type }}"=="Debug" (
          cmake --build --preset=debug
        ) else (
          cmake --build --preset=release
        )

    - name: Test (Linux/macOS)
      if: matrix.os != 'windows-2025-vs2026'
      run: |
        if [ "${{ matrix.build-type }}" = "Debug" ]; then
          ctest --preset=debug --output-on-failure
        else
          ctest --preset=release --output-on-failure
        fi

    - name: Test (Windows)
      if: matrix.os == 'windows-2025-vs2026'
      shell: cmd
      run: |
        if "${{ matrix.build-type }}"=="Debug" (
          ctest --preset=debug -C Debug --output-on-failure
        ) else (
          ctest --preset=release -C Release --output-on-failure
        )
